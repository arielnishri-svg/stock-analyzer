<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080c10;
  --card: #0d141d;
  --border: #1a2a3a;
  --accent: #0ea5e9;
  --text: #e2e8f0;
  --muted: #4a6f8a;
  --sub: #94b8d0;
  --green: #22c55e;
  --yellow: #facc15;
  --red: #ef4444;
}
body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; }

/* ── LANDING ── */
#landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
  overflow: hidden;
}
#landing::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% 0%, #0ea5e91a 0%, transparent 70%);
  pointer-events: none;
}
.grid-bg {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.3;
  pointer-events: none;
}
.land-label { font-size: 10px; letter-spacing: 6px; color: var(--accent); margin-bottom: 12px; }
.land-title { font-family: 'Syne', sans-serif; font-size: clamp(36px,7vw,72px); font-weight: 800; text-align: center; line-height: 1; margin-bottom: 8px; }
.land-title span { color: var(--accent); }
.land-sub { color: var(--muted); font-size: 12px; letter-spacing: 2px; margin-bottom: 48px; text-align: center; }

.search-wrap { width: 100%; max-width: 560px; position: relative; }
.search-input {
  width: 100%;
  background: var(--card);
  border: 2px solid var(--accent);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 16px;
  padding: 16px 140px 16px 20px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { box-shadow: 0 0 0 3px #0ea5e930; }
.search-btn {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  background: var(--accent);
  border: none;
  color: #000;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 0 22px;
  cursor: pointer;
  transition: background .2s;
}
.search-btn:hover { background: #38bdf8; }
.search-btn:disabled { background: var(--muted); cursor: not-allowed; }

.examples { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.ex-chip {
  background: #0d141d;
  border: 1px solid var(--border);
  color: var(--sub);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 5px 12px;
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.ex-chip:hover { border-color: var(--accent); color: var(--accent); }
.key-section { width: 100%; max-width: 560px; margin-top: 24px; position: relative; }
.key-row { display: flex; align-items: center; gap: 8px; }
.key-label { font-size: 10px; letter-spacing: 3px; color: var(--muted); white-space: nowrap; }
.key-input {
  flex: 1;
  background: #0a0f15;
  border: 1px solid var(--border);
  color: var(--sub);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  padding: 7px 12px;
  outline: none;
  transition: border-color .2s;
}
.key-input::placeholder { color: #2a4a6a; }
.key-input:focus { border-color: var(--accent); }
.key-save {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 7px 12px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: border-color .2s, color .2s;
  white-space: nowrap;
}
.key-save:hover { border-color: var(--accent); color: var(--accent); }
.key-hint { font-size: 10px; color: #1e3a5f; margin-top: 6px; letter-spacing: 1px; }
.key-status { font-size: 10px; margin-top: 6px; letter-spacing: 1px; }

/* ── LOADING ── */
#loading {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px;
}
.load-ticker { font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; color: var(--accent); }
.load-msg { color: var(--sub); font-size: 12px; letter-spacing: 2px; min-height: 20px; text-align: center; }
.progress-bar { width: 300px; height: 2px; background: var(--border); position: relative; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width .4s ease; }
.pulse-dots { display: flex; gap: 6px; margin-top: 8px; }
.pulse-dots span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  animation: pulse 1.2s ease-in-out infinite;
}
.pulse-dots span:nth-child(2) { animation-delay: .2s; }
.pulse-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,100%{opacity:.2; transform:scale(1)} 50%{opacity:1; transform:scale(1.3)} }

/* ── RESULT ── */
#result { display: none; padding: 24px 16px; }
.wrap { max-width: 920px; margin: 0 auto; }
.back-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 6px 14px;
  cursor: pointer;
  margin-bottom: 20px;
  letter-spacing: 1px;
  transition: border-color .2s, color .2s;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

/* reuse SNDK styles */
.label { font-size: 10px; letter-spacing: 6px; color: var(--accent); margin-bottom: 6px; }
h1 { font-family: 'Syne', sans-serif; font-size: 34px; font-weight: 800; color: #f0f9ff; line-height: 1.1; margin-bottom: 6px; }
h1 span { color: var(--accent); }
.sub { color: var(--muted); font-size: 11px; letter-spacing: 1px; margin-bottom: 28px; }
.hero { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
.ticker-big { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; color: #f0f9ff; }
.price-tag { font-size: 13px; color: var(--muted); font-weight: 400; margin-left: 12px; }
.company-name { color: #7dd3fc; font-size: 14px; margin-top: 4px; }
.sector-tag { color: var(--muted); font-size: 11px; letter-spacing: 2px; margin-top: 4px; }
.scores { display: flex; gap: 10px; }
.score-box { background: #0d1f2d; border: 2px solid var(--accent); padding: 8px 16px; text-align: center; }
.score-box .lbl { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 2px; }
.score-box .val { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; }
.score-box .den { font-size: 10px; color: var(--muted); }
.verdict-box { padding: 8px 16px; text-align: center; min-width: 110px; border: 2px solid; }
.verdict-box .lbl { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 2px; }
.verdict-box .val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; }
.summary { background: #0d141d; border: 1px solid #1a2a3a; border-left: 3px solid var(--accent); padding: 14px 18px; margin-bottom: 24px; font-size: 13px; color: var(--sub); line-height: 1.7; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; margin-bottom: 24px; }
.card { background: var(--card); border: 1px solid var(--border); padding: 20px; }
.card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.cat-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px; }
.ring { width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; border: 2px solid; }
.item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #111a24; }
.item:last-child { border-bottom: none; }
.item-name { font-size: 12px; color: var(--sub); margin-bottom: 2px; }
.item-note { font-size: 11px; opacity: .85; }
.bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.strengths { background: #0a1f0f; border: 1px solid #14532d; padding: 18px; }
.risks { background: #1f0a0a; border: 1px solid #7f1d1d; padding: 18px; }
.sl { font-size: 10px; letter-spacing: 3px; margin-bottom: 10px; }
.sitem { font-size: 12px; padding: 6px 0; border-bottom: 1px solid; display: flex; gap: 8px; }
.disclaimer { font-size: 10px; color: #1e3a5f; letter-spacing: 1px; text-align: center; padding: 14px 0; border-top: 1px solid #0f1e2e; }

.error-box { background: #1f0a0a; border: 1px solid #7f1d1d; padding: 20px; margin: 20px 0; color: #fca5a5; font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="grid-bg"></div>
  <div class="land-label">AI-POWERED DUE DILIGENCE</div>
  <h1 class="land-title">STOCK <span>ANALYZER</span></h1>
  <p class="land-sub">30-POINT EVALUATION · POWERED BY CLAUDE AI</p>
  <div class="search-wrap">
    <input id="stockInput" class="search-input" type="text" placeholder="Enter ticker or company (e.g. NVDA, Apple, Tesla…)" autocomplete="off" />
    <button class="search-btn" id="analyzeBtn" onclick="startAnalysis()">ANALYZE</button>
  </div>
  <div class="examples">
    <span class="ex-chip" onclick="quickSearch('NVDA')">NVDA</span>
    <span class="ex-chip" onclick="quickSearch('Apple')">Apple</span>
    <span class="ex-chip" onclick="quickSearch('TSLA')">Tesla</span>
    <span class="ex-chip" onclick="quickSearch('META')">Meta</span>
    <span class="ex-chip" onclick="quickSearch('MSFT')">Microsoft</span>
    <span class="ex-chip" onclick="quickSearch('AMD')">AMD</span>
  </div>

  <div class="key-section">
    <div class="key-row">
      <span class="key-label">API KEY</span>
      <input id="apiKeyInput" class="key-input" type="password" placeholder="sk-ant-… (required outside Claude.ai)" autocomplete="off" />
      <button class="key-save" onclick="saveKey()">SAVE</button>
    </div>
    <div id="keyStatus" class="key-status"></div>
    <div class="key-hint">Not needed when running inside Claude.ai · Stored locally in your browser</div>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="land-label">RESEARCHING</div>
  <div class="load-ticker" id="loadTicker">—</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="load-msg" id="loadMsg">Initializing analysis…</div>
  <div class="pulse-dots"><span></span><span></span><span></span></div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="wrap">
    <button class="back-btn" onclick="goBack()">← NEW SEARCH</button>
    <div id="resultContent"></div>
  </div>
</div>

<script>
const stockInput = document.getElementById('stockInput');
const analyzeBtn = document.getElementById('analyzeBtn');

stockInput.addEventListener('keydown', e => { if (e.key === 'Enter') startAnalysis(); });

function quickSearch(name) {
  stockInput.value = name;
  startAnalysis();
}

function goBack() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  stockInput.value = '';
}

function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('loadMsg').textContent = msg;
}

async function startAnalysis() {
  const query = stockInput.value.trim();
  if (!query) return;

  // show loading
  document.getElementById('landing').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  const loadingEl = document.getElementById('loading');
  loadingEl.style.display = 'flex';
  document.getElementById('loadTicker').textContent = query.toUpperCase();
  setProgress(5, 'Connecting to AI…');
  analyzeBtn.disabled = true;

  const messages = [
    'Fetching market data…',
    'Analyzing business fundamentals…',
    'Evaluating financial health…',
    'Assessing valuation metrics…',
    'Researching risk factors…',
    'Checking market sentiment…',
    'Compiling 30-point checklist…',
    'Generating verdict…'
  ];
  let msgIdx = 0;
  const progressSteps = [10, 20, 35, 50, 65, 75, 88, 95];
  const ticker = setInterval(() => {
    if (msgIdx < messages.length) {
      setProgress(progressSteps[msgIdx], messages[msgIdx]);
      msgIdx++;
    }
  }, 1800);

  const systemPrompt = `You are a professional stock analyst. When given a stock ticker or company name, perform a thorough 30-point due diligence analysis using your knowledge and web search. Output ONLY valid JSON — no markdown, no preamble, no trailing text.

The JSON schema:
{
  "ticker": "XXXX",
  "price": "~$XXX",
  "company": "Full Company Name",
  "sector": "SECTOR · INDUSTRY",
  "score": <number 0-100>,
  "verdict": "BUY" | "HOLD" | "SELL",
  "summary": "<2-3 sentence executive summary of the investment thesis>",
  "categories": [
    {
      "title": "🔭 BUSINESS FUNDAMENTALS",
      "score": <0-100>,
      "items": [
        { "status": "✅" | "⚠️" | "❌", "name": "Clear business model", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Competitive moat", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Market size & growth potential", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Management quality", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Revenue diversification", "note": "..." }
      ]
    },
    {
      "title": "💹 FINANCIAL HEALTH",
      "score": <0-100>,
      "items": [
        { "status": "✅" | "⚠️" | "❌", "name": "Revenue growth", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Profit margins", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Debt levels", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Free cash flow", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Return on equity", "note": "..." }
      ]
    },
    {
      "title": "⚖️ VALUATION",
      "score": <0-100>,
      "items": [
        { "status": "✅" | "⚠️" | "❌", "name": "PE ratio vs sector", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "PS ratio", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "PB ratio", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Forward earnings", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Fair value vs price", "note": "..." }
      ]
    },
    {
      "title": "🛡️ RISK FACTORS",
      "score": <0-100>,
      "items": [
        { "status": "✅" | "⚠️" | "❌", "name": "Regulatory risks", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Competitive threats", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Macro headwinds", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Insider selling", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Concentration risks", "note": "..." }
      ]
    },
    {
      "title": "🌡️ MARKET SENTIMENT",
      "score": <0-100>,
      "items": [
        { "status": "✅" | "⚠️" | "❌", "name": "Analyst ratings", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Earnings surprises", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Institutional ownership", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Short interest", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "52-week range position", "note": "..." }
      ]
    },
    {
      "title": "🧩 PORTFOLIO FIT",
      "score": <0-100>,
      "items": [
        { "status": "✅" | "⚠️" | "❌", "name": "Investment goals alignment", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Risk tolerance fit", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Sector concentration", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Time horizon match", "note": "..." },
        { "status": "✅" | "⚠️" | "❌", "name": "Position size", "note": "..." }
      ]
    }
  ],
  "strengths": ["strength 1", "strength 2", "strength 3"],
  "risks": ["risk 1", "risk 2", "risk 3"]
}

Use your best current knowledge. Be specific with real data (actual revenue figures, P/E ratios, etc.) where you know them. Notes should be concise (1 sentence). Be honest — don't make everything green.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: (() => {
        const h = {
          'Content-Type': 'application/json',
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        };
        const k = localStorage.getItem('anthropic_api_key');
        if (k) h['x-api-key'] = k;
        return h;
      })(),
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: systemPrompt,
        messages: [{ role: 'user', content: `Analyze this stock for a 30-point due diligence checklist: "${query}". Use web search to get current price, recent financials, analyst targets, and news. Return only JSON.` }]
      })
    });

    clearInterval(ticker);
    setProgress(100, 'Analysis complete!');

    const data = await res.json();
    const fullText = (data.content || [])
      .map(b => b.type === 'text' ? b.text : '')
      .join('');

    // Extract JSON from response
    let parsed;
    try {
      const match = fullText.match(/\{[\s\S]*\}/);
      parsed = JSON.parse(match ? match[0] : fullText);
    } catch {
      throw new Error('Could not parse AI response. Raw: ' + fullText.slice(0, 200));
    }

    setTimeout(() => renderResult(parsed), 400);

  } catch (err) {
    clearInterval(ticker);
    loadingEl.style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('resultContent').innerHTML = `
      <button class="back-btn" onclick="goBack()">← NEW SEARCH</button>
      <div class="error-box">
        <strong>Analysis failed.</strong><br>${err.message}
      </div>`;
    analyzeBtn.disabled = false;
  }
}

function scoreColor(s) {
  if (s >= 70) return '#22c55e';
  if (s >= 50) return '#facc15';
  return '#ef4444';
}

function statusColor(s) {
  if (s === '✅') return '#22c55e';
  if (s === '⚠️') return '#facc15';
  return '#ef4444';
}

function verdictStyle(v) {
  const map = { BUY: { bg: '#0a1f0f', border: '#22c55e', color: '#22c55e' }, HOLD: { bg: '#1e1e0a', border: '#facc15', color: '#facc15' }, SELL: { bg: '#1f0a0a', border: '#ef4444', color: '#ef4444' } };
  return map[v] || map.HOLD;
}

function renderResult(d) {
  const vs = verdictStyle(d.verdict);
  const sc = scoreColor(d.score);
  const date = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();

  let catHTML = '';
  (d.categories || []).forEach(cat => {
    const cc = scoreColor(cat.score);
    let items = '';
    (cat.items || []).forEach(it => {
      const ic = statusColor(it.status);
      items += `<div class="item"><span>${it.status}</span><div><div class="item-name">${it.name}</div><div class="item-note" style="color:${ic}">${it.note}</div></div></div>`;
    });
    catHTML += `<div class="card">
      <div class="card-head">
        <span class="cat-title">${cat.title}</span>
        <div class="ring" style="border-color:${cc};color:${cc}">${cat.score}</div>
      </div>
      ${items}
    </div>`;
  });

  const strengths = (d.strengths || []).map(s =>
    `<div class="sitem" style="color:#86efac;border-color:#14532d"><span>✦</span><span>${s}</span></div>`
  ).join('');
  const risks = (d.risks || []).map(r =>
    `<div class="sitem" style="color:#fca5a5;border-color:#7f1d1d"><span>▲</span><span>${r}</span></div>`
  ).join('');

  document.getElementById('resultContent').innerHTML = `
    <div class="label">STOCK DUE DILIGENCE</div>
    <h1>STOCK <span>CHECKLIST</span></h1>
    <p class="sub">30-POINT EVALUATION · ${date}</p>
    <div class="hero">
      <div>
        <div class="ticker-big">${d.ticker} <span class="price-tag">${d.price}</span></div>
        <div class="company-name">${d.company}</div>
        <div class="sector-tag">${d.sector}</div>
      </div>
      <div class="scores">
        <div class="score-box">
          <div class="lbl">SCORE</div>
          <div class="val" style="color:${sc}">${d.score}</div>
          <div class="den">/100</div>
        </div>
        <div class="verdict-box" style="background:${vs.bg};border-color:${vs.border}">
          <div class="lbl">VERDICT</div>
          <div class="val" style="color:${vs.color}">${d.verdict}</div>
        </div>
      </div>
    </div>
    <div class="summary">${d.summary}</div>
    <div class="grid">${catHTML}</div>
    <div class="bottom">
      <div class="strengths">
        <div class="sl" style="color:#22c55e">KEY STRENGTHS</div>
        ${strengths}
      </div>
      <div class="risks">
        <div class="sl" style="color:#ef4444">KEY RISKS</div>
        ${risks}
      </div>
    </div>
    <div class="disclaimer">⚠ AI-generated analysis for informational purposes only. Not financial advice. Always verify with current data and consult a financial advisor before investing.</div>
  `;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  analyzeBtn.disabled = false;
  window.scrollTo(0, 0);
}

// ── API KEY ──
function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (val) {
    localStorage.setItem('anthropic_api_key', val);
    showKeyStatus('✓ KEY SAVED', '#22c55e');
  } else {
    localStorage.removeItem('anthropic_api_key');
    showKeyStatus('KEY CLEARED', '#facc15');
  }
}

function showKeyStatus(msg, color) {
  const el = document.getElementById('keyStatus');
  el.textContent = msg;
  el.style.color = color;
  setTimeout(() => { el.textContent = ''; }, 2000);
}

function initKey() {
  const k = localStorage.getItem('anthropic_api_key');
  const inp = document.getElementById('apiKeyInput');
  if (k) {
    inp.value = k;
    const el = document.getElementById('keyStatus');
    el.textContent = '✓ KEY LOADED';
    el.style.color = '#22c55e';
  }
}

document.addEventListener('DOMContentLoaded', initKey);
</script>
</body>
</html>
